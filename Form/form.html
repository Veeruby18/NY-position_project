<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="form.css" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <h1>Leave a comment</h1>
      <label for="name">Username:</label>
      <input type="text" id="name" name="username" />
      <br />
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" />
      <br />
      <label for="msg">Comment:</label>
      <textarea id="msg" name="user_comment"></textarea>

      <br />
      <fieldset>
        <legend>What is your overall opinion about this article?</legend>
        <label>
          <input type="radio" name="opinion" value="positive" /> Positive
        </label>
        <br />
        <label>
          <input type="radio" name="opinion" value="neutral" /> Neutral
        </label>
        <br />
        <label>
          <input type="radio" name="opinion" value="negative" /> Negative
        </label>
      </fieldset>
      <br />
      <label>
        <input type="checkbox" name="subscribe" value="yes" /> I want to
        subscribe to the newsletter
      </label>
      <br />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
